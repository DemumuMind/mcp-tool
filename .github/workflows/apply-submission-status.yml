name: Apply submission status

on:
  workflow_dispatch:
    inputs:
      patch_json:
        description: 'Status patch (e.g., {"slug":"my-tool","status":"needs-info","reviewNotes":"Please add a demo link"})'
        required: true
        type: string
      reason:
        description: 'Reason for this status change'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-submission-status
  cancel-in-progress: false

jobs:
  apply-status:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate and apply status
        env:
          PATCH_JSON: ${{ inputs.patch_json }}
        run: node scripts/apply-submission-status.mjs "$PATCH_JSON"

      - name: Run invariant tests
        run: node --test tests/invariants/*.test.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet site/src/data/submissions.json; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATCH_JSON: ${{ inputs.patch_json }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH="submission-status/$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add site/src/data/submissions.json
          git commit -m "chore(submissions): update submission status" -m "Reason: $REASON"
          git push origin "$BRANCH"
          export RISK_NOTES="$(cat /tmp/submission-status-risk-notes.txt 2>/dev/null || echo 'No risk notes')"
          node scripts/lib/workflow-pr-body.mjs submission-status /tmp/pr-body.md
          gh pr create \
            --title "chore(submissions): update submission status" \
            --body-file /tmp/pr-body.md \
            --base main --head "$BRANCH"
