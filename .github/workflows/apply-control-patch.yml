name: Apply control patch

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

on:
  workflow_dispatch:
    inputs:
      patch_json:
        description: 'Patch JSON (e.g., {"governance.json":{"decisionsFrozen":true}})'
        required: false
        type: string
      patch_json_b64:
        description: 'Optional base64-encoded patch JSON for CLI/API callers that need stable transport'
        required: false
        type: string
      reason:
        description: 'Reason for this change'
        required: true
        type: string

permissions:
  contents: write
  pull-requests: write

concurrency:
  group: apply-control-patch
  cancel-in-progress: false

jobs:
  apply-patch:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5

      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22

      - name: Install dependencies
        run: npm ci

      - name: Validate and apply patch
        env:
          PATCH_JSON: ${{ inputs.patch_json }}
          PATCH_JSON_B64: ${{ inputs.patch_json_b64 }}
        run: node scripts/apply-control-patch.mjs "$PATCH_JSON" "$PATCH_JSON_B64"

      - name: Run invariant tests
        run: node --test tests/invariants/*.test.mjs

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet site/src/data/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Open PR
        if: steps.changes.outputs.changed == 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PATCH_JSON: ${{ inputs.patch_json }}
          PATCH_JSON_B64: ${{ inputs.patch_json_b64 }}
          REASON: ${{ inputs.reason }}
        run: |
          BRANCH="control-patch/$(date +%Y%m%d-%H%M%S)"
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git checkout -B "$BRANCH"
          git add site/src/data/governance.json site/src/data/promo.json site/src/data/promo-queue.json site/src/data/experiments.json
          git commit -m "chore(control): apply control patch" -m "Reason: $REASON"
          git push origin "$BRANCH"
          export RISK_NOTES="$(cat /tmp/patch-risk-notes.txt 2>/dev/null || echo 'No risk notes')"
          export DIFF_SUMMARY="$(git diff HEAD~1 --stat site/src/data/ | head -20)"
          node scripts/lib/workflow-pr-body.mjs control-patch /tmp/pr-body.md
          gh pr create \
            --title "chore(control): apply control patch" \
            --body-file /tmp/pr-body.md \
            --base main --head "$BRANCH"


