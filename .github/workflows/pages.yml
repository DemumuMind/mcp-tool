name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'kit.config.json'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Fetch MarketIR snapshot
        continue-on-error: true
        run: node scripts/fetch-marketir.mjs
      - name: Fetch GitHub facts
        run: node scripts/fetch-github-facts.mjs
      - name: Generate link registry
        run: node scripts/gen-links.mjs
      - name: Generate go-link redirect pages
        run: node scripts/gen-go-links.mjs
      - name: Generate press kits
        run: node scripts/gen-presskit.mjs
      - name: Generate snippets
        run: node scripts/gen-snippets.mjs
      - name: Generate campaign bundles
        run: node scripts/gen-campaign-bundles.mjs
      - name: Generate outreach packs
        run: node scripts/gen-outreach-packs.mjs
      - name: Generate partner packs
        run: node scripts/gen-partner-packs.mjs
      - name: Generate trust receipt
        run: node scripts/gen-trust-receipt.mjs
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - uses: actions/upload-pages-artifact@7b1f4a764d45c48632c6b24a0339c27f5614fb0b # v4
        with:
          path: site/dist/client

  deploy:
    needs: build
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    outputs:
      page_url: ${{ steps.deployment.outputs.page_url }}
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5
      - uses: actions/setup-node@a0853c24544627f65ddf259abe73b1d18a591444 # v5
        with:
          node-version: 22
      - name: Smoke test live site
        run: node scripts/smoke-test.mjs "${{ needs.deploy.outputs.page_url }}"


