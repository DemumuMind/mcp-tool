name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'kit.config.json'
      - 'site/**'
      - 'scripts/**'
      - '.github/workflows/pages.yml'
  workflow_dispatch:

concurrency:
  group: pages
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PUBLIC_SITE_URL: ${{ vars.PUBLIC_SITE_URL }}
    outputs:
      page_url: ${{ steps.page.outputs.page_url }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: |
            package-lock.json
            site/package-lock.json
      - name: Install root dependencies
        run: npm ci
      - name: Fetch MarketIR snapshot
        run: |
          set +e
          node scripts/fetch-marketir.mjs
          status=$?
          set -e
          if [ "$status" -ne 0 ]; then
            echo 'MarketIR snapshot unavailable; continuing with fallback data.'
          fi
          exit 0
      - name: Fetch GitHub facts
        run: node scripts/fetch-github-facts.mjs
      - name: Generate link registry
        run: node scripts/gen-links.mjs
      - name: Generate go-link redirect pages
        run: node scripts/gen-go-links.mjs
      - name: Generate press kits
        run: node scripts/gen-presskit.mjs
      - name: Generate snippets
        run: node scripts/gen-snippets.mjs
      - name: Generate campaign bundles
        run: node scripts/gen-campaign-bundles.mjs
      - name: Generate outreach packs
        run: node scripts/gen-outreach-packs.mjs
      - name: Generate partner packs
        run: node scripts/gen-partner-packs.mjs
      - name: Generate trust receipt
        run: node scripts/gen-trust-receipt.mjs
      - run: npm ci
        working-directory: site
      - run: npm run build
        working-directory: site
      - name: Remove internal lab artifacts from public bundle
        run: |
          rm -rf site/dist/client/lab
          rm -f site/dist/client/links.json
      - name: Assert public build safety
        run: node scripts/assert-public-build-safety.mjs site/dist/client
      - name: Verify public build artifacts
        run: node --test tests/build-artifacts/*.test.mjs
      - id: page
        name: Expose public site URL
        run: echo "page_url=${PUBLIC_SITE_URL}" >> "$GITHUB_OUTPUT"
      - name: Publish gh-pages branch
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: |
          touch site/dist/client/.nojekyll
          cd site/dist/client
          git init
          git checkout -B gh-pages
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add --all
          git commit -m "Deploy ${GITHUB_SHA}"
          git remote add origin "https://x-access-token:${GITHUB_TOKEN}@github.com/${GITHUB_REPOSITORY}.git"
          git push --force origin gh-pages

  smoke:
    needs: deploy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6
        with:
          node-version: 22
      - name: Wait for Pages update
        run: |
          for attempt in $(seq 1 24); do
            status=$(curl -s -o /dev/null -w "%{http_code}" "${{ needs.deploy.outputs.page_url }}")
            if [ "$status" = "200" ]; then
              exit 0
            fi
            sleep 5
          done
          echo "Pages site did not become reachable in time" >&2
          exit 1
      - name: Smoke test live site
        run: node scripts/smoke-test.mjs "${{ needs.deploy.outputs.page_url }}"

